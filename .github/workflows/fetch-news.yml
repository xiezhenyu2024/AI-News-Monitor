name: News Daily

on:
  workflow_dispatch:

concurrency:
  group: news-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: news-state
          path: .
        continue-on-error: true

      - run: |
          if [ ! -f state.json ]; then echo "{}" > state.json; fi
          if [ ! -f tracked.json ]; then echo "[]" > tracked.json; fi
          if [ ! -f judgments.json ]; then echo "[]" > judgments.json; fi
          if [ ! -f subjects.json ]; then echo "{}" > subjects.json; fi
          if [ ! -f trends.json ]; then echo "[]" > trends.json; fi
          if [ ! -f causality.json ]; then echo "[]" > causality.json; fi

      - name: Run
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: news-state
          path: |
            state.json
            tracked.json
            judgments.json
            subjects.json
            trends.json
            causality.json
          overwrite: true
          retention-days: 1
