name: Time Trigger

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: news-daily
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check time and trigger main workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          H=$(TZ='Asia/Shanghai' date +%H)
          M=$(TZ='Asia/Shanghai' date +%M)

          if [ "$H" = "07" ] || { [ "$H" = "08" ] && [ "$M" -le 30 ]; }; then
            gh workflow run "News Daily"
            echo "Triggered: morning"
          elif [ "$H" = "14" ] || { [ "$H" = "15" ] && [ "$M" -le 30 ]; }; then
            gh workflow run "News Daily"
            echo "Triggered: afternoon"
          elif [ "$H" = "21" ] || { [ "$H" = "22" ] && [ "$M" -le 30 ]; ]; then
            gh workflow run "News Daily"
            echo "Triggered: evening"
          else
            echo "Not trigger time: ${H}:${M}"
          fi
